<!DOCTYPE html>
<html lang="en">
<head>
     <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tech Stack</title>
</head>
<body>
    <h1>My Tech Stack</h1>
      <!-- Tech Stack Section -->
<section class="tech-stack" id="tech-stack">
  <h2 class="heading">My <span>Tech Stack</span></h2>
  <div class="stack-container">
    <!-- Each stack item -->
    <div class="stack-item">
      <img src="asset/html-logo.png" alt="HTML Logo">
      <p>HTML</p>
    </div>
    <div class="stack-item">
      <img src="asset/css-logo.png" alt="CSS Logo">
      <p>CSS</p>
    </div>
    <div class="stack-item">
      <img src="asset/js-logo.png" alt="JavaScript Logo">
      <p>JavaScript</p>
    </div>
    <div class="stack-item">
      <img src="asset/git-logo.png" alt="Git Logo">
      <p>Git</p>
    </div>
  </div>
</section>
</body>
</html>
